name: SCA

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  snyk-cli:
    uses: auth0/devsecops-tooling/.github/workflows/sca-scan.yml@main
    with:
      pre-scan-commands: "npm ci --workspaces --include-workspace-root"
      additional-arguments: "--exclude=README.md"
      node-version: 22
    secrets: inherit
