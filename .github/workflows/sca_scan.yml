name: SCA

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  snyk-cli:
    uses: auth0/devsecops-tooling/.github/workflows/sca-scan.yml@main
    with:
      additional-arguments: "--exclude=README.md"
      node-version: 22
      pre-scan-commands: |
        for d in packages/*/; do
          (cd "$d" && npm install --install-strategy=nested --ignore-scripts)
        done
    secrets: inherit
